<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패트롤 점검 · 지적사항 추적 · TBM 체크리스트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:13px;}

/* ── 탭 네비게이션 ── */
.top-bar{background:#0d1f3c;padding:12px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.top-bar .brand{color:#fff;font-size:16px;font-weight:900;letter-spacing:-0.03em;white-space:nowrap;}
.top-bar .brand span{color:#60a5fa;font-weight:400;font-size:12px;margin-left:6px;}
.tabs{display:flex;gap:4px;}
.tab-btn{padding:8px 20px;border-radius:6px 6px 0 0;font-size:13px;font-weight:700;border:none;cursor:pointer;
  background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);transition:all .2s;}
.tab-btn:hover{background:rgba(255,255,255,0.2);color:#fff;}
.tab-btn.active{background:#f0f2f5;color:#0d1f3c;}

/* ── 공통 컨테이너 ── */
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:20px;margin-bottom:16px;}
.card-title{font-size:16px;font-weight:900;color:#0d1f3c;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:#e0e7ff;color:#3730a3;}

/* ── 사업장 선택 ── */
.site-sel{display:flex;gap:8px;margin-bottom:16px;}
.site-btn{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:700;border:2px solid #d1d5db;background:#fff;cursor:pointer;transition:all .15s;}
.site-btn:hover{border-color:#1e5096;background:#eef4ff;}
.site-btn.active{background:#1e5096;color:#fff;border-color:#1e5096;}

/* ── 연/월 선택 ── */
.ym-sel{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
.ym-sel select,.ym-sel input{padding:6px 10px;border:1.5px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;}
.ym-sel label{font-weight:700;font-size:13px;color:#374151;}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;}
.btn-primary{background:#1e5096;color:#fff;}.btn-primary:hover{background:#163d7a;}
.btn-success{background:#16a34a;color:#fff;}.btn-success:hover{background:#138a3e;}
.btn-danger{background:#dc2626;color:#fff;}.btn-danger:hover{background:#b91c1c;}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #d1d5db;}.btn-outline:hover{background:#f9fafb;}
.btn-sm{padding:4px 10px;font-size:11px;}

/* ══════════════════════════════════════
   TAB 1: 패트롤 체크리스트 (주간)
   ══════════════════════════════════════ */
.patrol-table{width:100%;border-collapse:collapse;font-size:11.5px;line-height:1.4;}
.patrol-table th{background:#0d1f3c;color:#fff;padding:5px 6px;font-weight:700;font-size:10.5px;text-align:center;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.patrol-table td{padding:4px 6px;border:1px solid #d1d5db;vertical-align:middle;}
.patrol-table .zone-hdr{background:#e8edf3;font-weight:800;font-size:11px;color:#0d1f3c;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.patrol-table .wk-col{width:52px;text-align:center;}
.patrol-table .no-col{width:28px;text-align:center;font-weight:600;color:#6b7280;font-size:10px;}
.patrol-table tr:nth-child(even) td{background:#fafbfc;}
.patrol-table .chk{width:18px;height:18px;cursor:pointer;accent-color:#1e5096;}

/* 주차 헤더 색상 */
.patrol-table th.wk-hdr{font-size:11px;letter-spacing:0.02em;}

/* ══════════════════════════════════════
   TAB 2: 지적사항 추적
   ══════════════════════════════════════ */
.issue-table{width:100%;border-collapse:collapse;font-size:12px;}
.issue-table th{background:#0d1f3c;color:#fff;padding:6px 8px;font-weight:700;font-size:11px;text-align:left;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.issue-table td{padding:6px 8px;border:1px solid #d1d5db;vertical-align:middle;}
.issue-table tr:nth-child(even) td{background:#fafbfc;}
.issue-table .resolved{background:#dcfce7!important;text-decoration:line-through;color:#6b7280;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.status-open{background:#fef2f2;color:#dc2626;}
.status-done{background:#dcfce7;color:#16a34a;}
.status-carry{background:#fef9c3;color:#a16207;}

.add-form{display:grid;grid-template-columns:100px 1fr 120px 100px auto;gap:8px;align-items:end;margin-top:12px;}
.add-form label{font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:2px;}
.add-form input,.add-form select{padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;width:100%;}

/* ══════════════════════════════════════
   TAB 3: TBM 일일 체크리스트 (캘린더)
   ══════════════════════════════════════ */
.tbm-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.tbm-cal .day-hdr{background:#0d1f3c;color:#fff;text-align:center;padding:6px 0;font-size:11px;font-weight:700;border-radius:4px;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.tbm-cal .day-hdr.sun{color:#fca5a5;}.tbm-cal .day-hdr.sat{color:#93c5fd;}
.tbm-cell{background:#fff;border:1.5px solid #e5e7eb;border-radius:6px;min-height:80px;padding:4px 6px;position:relative;
  cursor:pointer;transition:all .15s;font-size:10.5px;}
.tbm-cell:hover{border-color:#1e5096;box-shadow:0 2px 8px rgba(30,80,150,0.12);}
.tbm-cell.empty{background:#f9fafb;border-color:#f0f0f0;cursor:default;min-height:40px;}
.tbm-cell .date-num{font-weight:800;font-size:13px;color:#0d1f3c;}
.tbm-cell.sun .date-num{color:#dc2626;}
.tbm-cell.sat .date-num{color:#2563eb;}
.tbm-cell.today{border-color:#1e5096;border-width:2px;background:#eef4ff;}
.tbm-cell .tbm-status{margin-top:3px;font-size:9.5px;font-weight:600;}
.tbm-cell .tbm-done{color:#16a34a;}
.tbm-cell .tbm-pending{color:#d97706;}
.tbm-cell .tbm-none{color:#d1d5db;}
.tbm-cell .tbm-items{font-size:9px;color:#6b7280;margin-top:2px;line-height:1.3;}

/* TBM 상세 모달 */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.modal h3{font-size:16px;font-weight:900;color:#0d1f3c;margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;padding:0 4px;}
.modal-close:hover{color:#0d1f3c;}

.tbm-ck-list{list-style:none;}
.tbm-ck-list li{padding:6px 0;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;font-size:12px;}
.tbm-ck-list li:last-child{border:none;}
.tbm-ck-list input[type=checkbox]{width:16px;height:16px;accent-color:#16a34a;cursor:pointer;}
.tbm-ck-list .done-item{color:#9ca3af;text-decoration:line-through;}
.tbm-note{margin-top:12px;width:100%;padding:8px;border:1.5px solid #d1d5db;border-radius:6px;font-family:inherit;font-size:12px;resize:vertical;min-height:60px;}

/* ── 인쇄 스타일 ── */
@media print{
  body{background:#fff;font-size:10px;}
  .top-bar,.site-sel,.ym-sel,.btn,.add-form,.no-print{display:none!important;}
  .container{padding:5mm;max-width:100%;}
  .card{box-shadow:none;border:1px solid #ccc;padding:10px;page-break-inside:avoid;}
  .tab-content{display:block!important;}
  .modal-bg{display:none!important;}
  @page{size:A4 portrait;margin:8mm;}
}

/* ── 반응형 ── */
@media(max-width:768px){
  .top-bar{padding:10px 12px;gap:10px;}
  .tabs{width:100%;overflow-x:auto;}
  .tab-btn{white-space:nowrap;padding:8px 14px;font-size:12px;}
  .container{padding:12px 8px;}
  .add-form{grid-template-columns:1fr 1fr;gap:6px;}
  .add-form .full-span{grid-column:1/-1;}
  .tbm-cal{grid-template-columns:repeat(7,1fr);gap:2px;}
  .tbm-cell{min-height:60px;padding:3px 4px;font-size:9.5px;}
  .tbm-cell .date-num{font-size:11px;}
}
</style>
</head>
<body>

<!-- ────── 상단 탭바 ────── -->
<div class="top-bar">
  <div class="brand">신성오토텍 안전보건관리<span>Patrol + Issue + TBM</span></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('patrol',this)">패트롤 점검 (주간)</button>
    <button class="tab-btn" onclick="switchTab('issue',this)">지적사항 추적</button>
    <button class="tab-btn" onclick="switchTab('tbm',this)">TBM 일일 점검</button>
  </div>
</div>

<div class="container">

<!-- ══════════════════════════════════════════════
     TAB 1: 패트롤 체크리스트 (주간 W1~W5)
     ══════════════════════════════════════════════ -->
<div class="tab-content active" id="tab-patrol">
  <div class="card">
    <div class="card-title">현장 패트롤 점검표 <span class="badge">주간 체크</span></div>

    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
      <div class="site-sel" style="margin:0;">
        <button class="site-btn active" onclick="selectSite('suwon',this)">수원 (사출/조립)</button>
        <button class="site-btn" onclick="selectSite('hwaseong',this)">화성 (도색/화학)</button>
      </div>
      <div class="ym-sel" style="margin:0;">
        <label>연도</label>
        <select id="patrolYear" onchange="renderPatrol()"></select>
        <label>월</label>
        <select id="patrolMonth" onchange="renderPatrol()"></select>
      </div>
      <button class="btn btn-primary no-print" onclick="window.print()">인쇄</button>
      <button class="btn btn-outline no-print" onclick="exportPatrolData()">데이터 저장</button>
    </div>

    <div id="patrol-grid"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     TAB 2: 지적사항 추적 (Google Tasks 스타일 누적)
     ══════════════════════════════════════════════ -->
<div class="tab-content" id="tab-issue">

  <!-- 요약 통계 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
    <div class="card" style="text-align:center;padding:16px;">
      <div style="font-size:11px;color:#dc2626;font-weight:600;">미완료</div>
      <div style="font-size:28px;font-weight:900;color:#dc2626;" id="iss-stat-open">0</div>
      <div style="font-size:10px;color:#9ca3af;">건 개선 필요</div>
    </div>
    <div class="card" style="text-align:center;padding:16px;">
      <div style="font-size:11px;color:#16a34a;font-weight:600;">이번주 완료</div>
      <div style="font-size:28px;font-weight:900;color:#16a34a;" id="iss-stat-done">0</div>
      <div style="font-size:10px;color:#9ca3af;">건 조치 완료</div>
    </div>
    <div class="card" style="text-align:center;padding:16px;">
      <div style="font-size:11px;color:#1e5096;font-weight:600;">전체 누적</div>
      <div style="font-size:28px;font-weight:900;color:#1e5096;" id="iss-stat-total">0</div>
      <div style="font-size:10px;color:#9ca3af;">건 등록</div>
    </div>
  </div>

  <!-- 새 지적사항 입력 -->
  <div class="card no-print" style="margin-bottom:16px;">
    <div class="card-title">+ 새 지적사항 등록</div>
    <div style="display:grid;grid-template-columns:100px 1fr 120px;gap:8px;align-items:end;">
      <div><label style="font-size:11px;font-weight:600;display:block;margin-bottom:2px;">사업장</label>
        <select id="newSite" style="width:100%;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;">
          <option value="suwon">수원</option><option value="hwaseong">화성</option>
        </select></div>
      <div><label style="font-size:11px;font-weight:600;display:block;margin-bottom:2px;">지적사항 내용</label>
        <input type="text" id="newDesc" placeholder="예: 사출기 3번 안전문 고정핀 파손" style="width:100%;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;"></div>
      <div><label style="font-size:11px;font-weight:600;display:block;margin-bottom:2px;">위치/구역</label>
        <input type="text" id="newLocation" placeholder="예: 1층 사출라인" style="width:100%;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;margin-top:8px;">
      <div><label style="font-size:11px;font-weight:600;display:block;margin-bottom:2px;">발견일</label>
        <input type="date" id="newDate" style="width:100%;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;"></div>
      <div><label style="font-size:11px;font-weight:600;display:block;margin-bottom:2px;">개선기한</label>
        <input type="date" id="newDeadline" style="width:100%;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;"></div>
      <div><label style="font-size:11px;font-weight:600;display:block;margin-bottom:2px;">우선순위</label>
        <select id="newPriority" style="width:100%;padding:6px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:12px;">
          <option value="normal">일반</option><option value="high">긴급</option>
        </select></div>
      <button class="btn btn-success" onclick="addIssue()" style="height:34px;white-space:nowrap;">+ 등록</button>
    </div>
  </div>

  <!-- 미완료 목록 (Tasks 스타일) -->
  <div class="card" style="margin-bottom:16px;">
    <div class="card-title"><span style="color:#dc2626;">&#9679;</span> 미완료 지적사항 <span class="badge" style="background:#fef2f2;color:#dc2626;" id="openBadge">0건</span></div>
    <div id="issueOpenList" style="min-height:40px;"></div>
  </div>

  <!-- 완료 목록 (접을 수 있음) -->
  <div class="card">
    <div class="card-title" style="cursor:pointer;" onclick="toggleDoneList()">
      <span style="color:#16a34a;">&#9679;</span> 완료된 지적사항 <span class="badge" style="background:#dcfce7;color:#16a34a;" id="doneBadge">0건</span>
      <span style="font-size:11px;color:#9ca3af;margin-left:auto;" id="doneToggle">&#9660; 펼치기</span>
    </div>
    <div id="issueDoneList" style="display:none;"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     TAB 3: TBM 일일 점검 (캘린더)
     ══════════════════════════════════════════════ -->
<div class="tab-content" id="tab-tbm">
  <div class="card">
    <div class="card-title">TBM 일일 점검 캘린더 <span class="badge">Tool Box Meeting</span></div>

    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
      <div class="site-sel" style="margin:0;">
        <button class="site-btn active" onclick="selectSiteTBM('suwon',this)">수원</button>
        <button class="site-btn" onclick="selectSiteTBM('hwaseong',this)">화성</button>
      </div>
      <div class="ym-sel" style="margin:0;">
        <label>연도</label>
        <select id="tbmYear" onchange="renderTBM()"></select>
        <label>월</label>
        <select id="tbmMonth" onchange="renderTBM()"></select>
      </div>
      <button class="btn btn-primary no-print" onclick="window.print()">인쇄</button>
    </div>

    <!-- 범례 -->
    <div style="display:flex;gap:16px;margin-bottom:10px;font-size:11px;flex-wrap:wrap;">
      <span><span style="color:#16a34a;font-weight:700;">&#9679;</span> 완료</span>
      <span><span style="color:#d97706;font-weight:700;">&#9679;</span> 미완료 항목 있음</span>
      <span><span style="color:#d1d5db;font-weight:700;">&#9679;</span> 미실시</span>
    </div>

    <div id="tbm-calendar"></div>
  </div>
</div>

</div><!-- /container -->

<!-- TBM 상세 모달 -->
<div class="modal-bg" id="tbmModal" onclick="if(event.target===this)closeTBMModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeTBMModal()">&times;</button>
    <h3 id="tbmModalTitle">TBM 체크리스트</h3>
    <div style="font-size:12px;color:#6b7280;margin-bottom:12px;" id="tbmModalSub"></div>
    <ul class="tbm-ck-list" id="tbmModalList"></ul>
    <textarea class="tbm-note" id="tbmModalNote" placeholder="특이사항 / 안전 전달사항 메모"></textarea>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeTBMModal()">닫기</button>
      <button class="btn btn-success" onclick="saveTBMModal()">저장</button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   데이터 & 상태
   ───────────────────────────────────────── */
let currentSite = 'suwon';
let currentSiteTBM = 'suwon';
const siteLabels = {suwon:'수원공장', hwaseong:'화성공장'};

// localStorage 키 프리픽스
const LS_PATROL = 'ssatek_patrol_';
const LS_ISSUE = 'ssatek_issues';
const LS_TBM = 'ssatek_tbm_';

/* ── 패트롤 점검 항목 ── */
const patrolZones = [
  {id:'pc1',site:'all',name:'현장관리 기본',icon:'',items:[
    'TBM 활동 실시 확인',
    '보호구(안전모/안전화/보안경) 착용 확인',
    '통로 확보 (60cm 이상) 및 미끄럼 요인 없음',
    '안전표지/수칙 게시 상태 양호',
    '비상연락망/응급처치함 비치 확인',
    '작업 중 휴대폰 사용 금지 준수'
  ]},
  {id:'pc6',site:'all',name:'소방/비상',icon:'',items:[
    '소화기 배치/압력(녹색)/안전핀/몸체 양호',
    '소화전 표시등 점등 / 호스/노즐 결합 상태',
    '비상구 표시등 점등 / 장애물 없음',
    '대피로 확보 / 구급함 비치 확인',
    '비상 연락처 게시판 부착 상태'
  ]},
  {id:'pc5',site:'all',name:'전기/분전반',icon:'',items:[
    '각 층 분전반 문 잠금 / 피복 양호',
    '분전반 접지 상태 양호',
    '조명 손상/탈락 / 콘센트 파손 없음',
    '임시 연장선 방치 없음 / 가연성 물질 없음'

/* ─────────────────────────────────────────
   유틸리티
   ───────────────────────────────────────── */
function getWeekNumber(d){
  // 해당 월 내에서 몇째 주인지 (월요일 기준)
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const dayOfWeek = first.getDay() || 7; // 일=7
  const adjusted = d.getDate() + dayOfWeek - 2; // 월요일 기준 보정
  return Math.floor(adjusted / 7) + 1;
}

function getWeeksInMonth(year, month){
  // 해당 월의 주차 목록 반환 [{week, startDate, endDate, label}]
  const weeks = [];
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  let current = new Date(firstDay);
  // 월요일로 이동
  let dayOfWeek = current.getDay();
  if(dayOfWeek !== 1){
    // 이전 월요일로 (하지만 1일부터 시작)
  }

  let wk = 1;
  let weekStart = new Date(firstDay);
  for(let d = 1; d <= lastDay.getDate(); d++){
    const date = new Date(year, month, d);
    const dow = date.getDay();
    if(dow === 1 && d > 1){
      wk++;
      weekStart = new Date(date);
    }
    if(dow === 5 || d === lastDay.getDate()){ // 금요일 또는 월말
      if(!weeks.find(w=>w.week===wk)){
        const fri = dow===5 ? new Date(date) : null;
        weeks.push({
          week: wk,
          label: `W${wk}`,
          friday: fri ? `${fri.getMonth()+1}/${fri.getDate()}(금)` : '',
          friDate: fri
        });
      }
    }
  }
  // 누락된 주차 보정
  const result = [];
  for(let w=1; w<=wk; w++){
    const found = weeks.find(x=>x.week===w);
    if(found) result.push(found);
    else result.push({week:w, label:`W${w}`, friday:'', friDate:null});
  }
  return result;
}

function getISOWeek(d){
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const week1 = new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

function getWeekRange(d){
  // 해당 날짜가 속한 주의 월~일 범위
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day===0?-6:1);
  const mon = new Date(date.setDate(diff));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return {mon: new Date(mon), sun: new Date(sun)};
}

function formatDate(d){
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${mm}-${dd}`;
}

function lsGet(key, def){
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}
}
function lsSet(key, val){
  try{localStorage.setItem(key, JSON.stringify(val));}catch(e){}
}

function getPatrolKey(year, month, site){
  return LS_PATROL + `${year}_${month}_${site}`;
}

function renderPatrol(){
  const year = parseInt(document.getElementById('patrolYear').value);
  const month = parseInt(document.getElementById('patrolMonth').value);
  const weeks = getWeeksInMonth(year, month);
  const zones = patrolZones.filter(z => z.site==='all' || z.site===currentSite);
  const key = getPatrolKey(year, month, currentSite);
  const saved = lsGet(key, {});

  let html = `<table class="patrol-table">
    <thead><tr>
      <th class="no-col">No</th>
      <th style="text-align:left;">점검내용</th>`;
  weeks.forEach(w => {
    html += `<th class="wk-col wk-hdr">${w.label}<br><span style="font-size:8px;font-weight:400;opacity:0.8;">${w.friday}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  let num = 0;
  zones.forEach(zone => {
    html += `<tr><td colspan="${2+weeks.length}" class="zone-hdr">${zone.name}</td></tr>`;
    zone.items.forEach((item, idx) => {
      num++;
      const itemKey = `${zone.id}_${idx}`;
      html += `<tr><td class="no-col">${num}</td><td>${item}</td>`;
      weeks.forEach(w => {
        const ckKey = `${itemKey}_w${w.week}`;
        const checked = saved[ckKey] ? 'checked' : '';
        html += `<td class="wk-col"><input type="checkbox" class="chk" data-key="${ckKey}" ${checked} onchange="togglePatrol(this,'${key}')"></td>`;
      });
      html += `</tr>`;
    });
  });

  html += `</tbody></table>`;
  html += `<div style="margin-top:8px;font-size:11px;color:#6b7280;">총 ${num}개 항목 | ${siteLabels[currentSite]} | ${year}년 ${month+1}월</div>`;

  document.getElementById('patrol-grid').innerHTML = html;
}

function togglePatrol(el, lsKey){
  const saved = lsGet(lsKey, {});
  if(el.checked) saved[el.dataset.key] = true;
  else delete saved[el.dataset.key];
  lsSet(lsKey, saved);
}

function exportPatrolData(){
  const year = parseInt(document.getElementById('patrolYear').value);
  const month = parseInt(document.getElementById('patrolMonth').value);
  const key = getPatrolKey(year, month, currentSite);
  const data = lsGet(key, {});
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `patrol_${currentSite}_${year}_${month+1}.json`;
  a.click();
}

function getIssues(){ return lsGet(LS_ISSUE, []); }
function saveIssues(issues){ lsSet(LS_ISSUE, issues); }

function addIssue(){
  const desc = document.getElementById('newDesc').value.trim();
  if(!desc){alert('지적사항 내용을 입력하세요.');return;}
  const issues = getIssues();
  issues.push({
    id: Date.now(),
    date: document.getElementById('newDate').value || formatDate(new Date()),
    site: document.getElementById('newSite').value || 'suwon',
    desc: desc,
    location: document.getElementById('newLocation').value.trim(),
    deadline: document.getElementById('newDeadline').value || '',
    priority: document.getElementById('newPriority').value || 'normal',
    status: 'open',
    resolvedDate: ''
  });
  saveIssues(issues);
  document.getElementById('newDesc').value = '';
  document.getElementById('newLocation').value = '';
  renderIssues();
}

function toggleIssueStatus(id){
  const issues = getIssues();
  const issue = issues.find(i=>i.id===id);
  if(!issue) return;
  if(issue.status==='open'){
    issue.status='done';
    issue.resolvedDate=formatDate(new Date());
  } else {
    issue.status='open';
    issue.resolvedDate='';
  }
  saveIssues(issues);
  renderIssues();
}

function deleteIssue(id){
  if(!confirm('이 지적사항을 삭제하시겠습니까?')) return;
  saveIssues(getIssues().filter(i=>i.id!==id));
  renderIssues();
}

function toggleDoneList(){
  const list = document.getElementById('issueDoneList');
  const icon = document.getElementById('doneToggle');
  if(list.style.display==='none'){ list.style.display='block'; icon.innerHTML='\u25B2 접기'; }
  else { list.style.display='none'; icon.innerHTML='\u25BC 펼치기'; }
}

function renderIssues(){
  const issues = getIssues();
  const today = formatDate(new Date());
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monDiff = dayOfWeek===0 ? -6 : 1-dayOfWeek;
  const mon = new Date(now); mon.setDate(now.getDate()+monDiff);
  const monStr = formatDate(mon);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const sunStr = formatDate(sun);

  const openIssues = issues.filter(i=>i.status==='open').sort((a,b)=>{
    if(a.priority==='high' && b.priority!=='high') return -1;
    if(b.priority==='high' && a.priority!=='high') return 1;
    return new Date(b.date) - new Date(a.date);
  });
  const doneIssues = issues.filter(i=>i.status==='done').sort((a,b)=> new Date(b.resolvedDate||b.date) - new Date(a.resolvedDate||a.date));
  const doneThisWeek = doneIssues.filter(i=> i.resolvedDate >= monStr && i.resolvedDate <= sunStr);

  // 통계
  document.getElementById('iss-stat-open').textContent = openIssues.length;
  document.getElementById('iss-stat-done').textContent = doneThisWeek.length;
  document.getElementById('iss-stat-total').textContent = issues.length;
  document.getElementById('openBadge').textContent = openIssues.length+'건';
  document.getElementById('doneBadge').textContent = doneIssues.length+'건';

  // 기본 날짜
  const dateEl = document.getElementById('newDate');
  if(dateEl && !dateEl.value) dateEl.value = today;
  const dlEl = document.getElementById('newDeadline');
  if(dlEl && !dlEl.value){
    const daysToFri = (5-now.getDay()+7)%7;
    const nextFri = new Date(now); nextFri.setDate(now.getDate()+(daysToFri===0?7:daysToFri));
    dlEl.value = formatDate(nextFri);
  }

  // 미완료 목록 (Tasks 스타일)
  const openEl = document.getElementById('issueOpenList');
  if(openIssues.length===0){
    openEl.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px;font-size:13px;">모든 지적사항이 완료되었습니다!</div>';
  } else {
    openEl.innerHTML = openIssues.map(issue => {
      const isOverdue = issue.deadline && issue.deadline < today;
      const isHigh = issue.priority==='high';
      const borderColor = isOverdue ? '#dc2626' : isHigh ? '#ea580c' : '#e5e7eb';
      const bgColor = isOverdue ? '#fef2f2' : isHigh ? '#fff7ed' : '#fff';
      return `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1.5px solid ${borderColor};border-radius:10px;margin-bottom:8px;background:${bgColor};">
        <input type="checkbox" onclick="toggleIssueStatus(${issue.id})" style="width:20px;height:20px;accent-color:#16a34a;cursor:pointer;margin-top:2px;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.5;">
            ${isHigh?'<span style="color:#ea580c;font-size:11px;font-weight:700;">[긴급]</span> ':''}${issue.desc}
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:11px;color:#6b7280;">
            <span>${siteLabels[issue.site]||issue.site} ${issue.location?'- '+issue.location:''}</span>
            <span>${issue.date}</span>
            ${issue.deadline ? `<span style="color:${isOverdue?'#dc2626':'#6b7280'};">${isOverdue?'! ':''}기한: ${issue.deadline}${isOverdue?' (초과)':''}</span>` : ''}
          </div>
        </div>
        <button onclick="deleteIssue(${issue.id})" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;" class="no-print">&times;</button>
      </div>`;
    }).join('');
  }

  // 완료 목록
  const doneEl = document.getElementById('issueDoneList');
  if(doneIssues.length===0){
    doneEl.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:16px;font-size:13px;">완료된 항목이 없습니다.</div>';
  } else {
    doneEl.innerHTML = doneIssues.map(issue => {
      return `<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid #f0f0f0;opacity:0.7;">
        <input type="checkbox" checked onclick="toggleIssueStatus(${issue.id})" style="width:18px;height:18px;accent-color:#16a34a;cursor:pointer;margin-top:2px;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;color:#9ca3af;text-decoration:line-through;line-height:1.5;">${issue.desc}</div>
          <div style="font-size:11px;color:#9ca3af;margin-top:2px;">
            ${siteLabels[issue.site]||issue.site} ${issue.location?'- '+issue.location:''} | 완료: ${issue.resolvedDate||'-'}
          </div>
        </div>
        <button onclick="deleteIssue(${issue.id})" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;" class="no-print">&times;</button>
      </div>`;
    }).join('');
  }
}

function renderTBM(){
  const year = parseInt(document.getElementById('tbmYear').value);
  const month = parseInt(document.getElementById('tbmMonth').value);
  const firstDay = new Date(year, month, 1);
  const lastDate = new Date(year, month+1, 0).getDate();

  const today = new Date();

  const key = getTBMKey(year, month, currentSiteTBM);
  const saved = lsGet(key, {});

  const allItems = [...tbmItems.common, ...(tbmItems[currentSiteTBM]||[])];

  let html = '<div class="tbm-cal">';
  // 요일 헤더
  const dayNames = ['일','월','화','수','목','금','토'];
  dayNames.forEach((dn,i) => {
    const cls = i===0?'sun':i===6?'sat':'';
    html += `<div class="day-hdr ${cls}">${dn}</div>`;
  });

  // 빈 칸 (1일 이전)
  for(let i=0;i<startDow;i++){
    html += `<div class="tbm-cell empty"></div>`;
  }

  // 날짜 칸
  for(let d=1;d<=lastDate;d++){
    const date = new Date(year, month, d);
    const dow = date.getDay();
    const isToday = date.toDateString() === today.toDateString();
    const isSun = dow===0;
    const isSat = dow===6;
    const dayKey = `d${d}`;
    const dayData = saved[dayKey] || {};
    const checks = dayData.checks || {};
    const checkedCount = Object.values(checks).filter(v=>v).length;
    const totalCount = allItems.length;
    const isWeekend = isSun || isSat;

    let statusHtml = '';
    if(!isWeekend){
      if(checkedCount === totalCount && totalCount > 0){
        statusHtml = `<div class="tbm-status tbm-done">&#10003; 완료 (${checkedCount}/${totalCount})</div>`;
      } else if(checkedCount > 0){
        statusHtml = `<div class="tbm-status tbm-pending">&#9679; ${checkedCount}/${totalCount}</div>`;
      } else {
        statusHtml = `<div class="tbm-status tbm-none">- 미실시</div>`;
      }
    }

    const notePreview = dayData.note ? `<div class="tbm-items">${dayData.note.substring(0,20)}${dayData.note.length>20?'...':''}</div>` : '';
    const cls = [isToday?'today':'', isSun?'sun':'', isSat?'sat':''].filter(Boolean).join(' ');
    const onclick = isWeekend ? '' : `onclick="openTBMModal(${year},${month},${d})"`;

    html += `<div class="tbm-cell ${cls}" ${onclick}>
      <div class="date-num">${d}</div>
      ${statusHtml}
      ${notePreview}
    </div>`;
  }

  html += '</div>';
  document.getElementById('tbm-calendar').innerHTML = html;
}

let tbmModalDate = null;
function openTBMModal(year, month, day){
  tbmModalDate = {year, month, day};
  const key = getTBMKey(year, month, currentSiteTBM);
  const saved = lsGet(key, {});
  const dayData = saved[`d${day}`] || {};
  const checks = dayData.checks || {};
  const allItems = [...tbmItems.common, ...(tbmItems[currentSiteTBM]||[])];

  const date = new Date(year, month, day);
  const dayNames = ['일','월','화','수','목','금','토'];
  document.getElementById('tbmModalTitle').textContent = `TBM 체크리스트 - ${month+1}월 ${day}일 (${dayNames[date.getDay()]})`;
  document.getElementById('tbmModalSub').textContent = `${siteLabels[currentSiteTBM]} | ${year}년 ${month+1}월 ${day}일`;

  let listHtml = '';
  allItems.forEach((item, idx) => {
    const checked = checks[`i${idx}`] ? 'checked' : '';
    const doneClass = checks[`i${idx}`] ? 'done-item' : '';
    listHtml += `<li>
      <input type="checkbox" id="tbm_ck_${idx}" ${checked}>
      <label for="tbm_ck_${idx}" class="${doneClass}">${item}</label>
    </li>`;
  });
  document.getElementById('tbmModalList').innerHTML = listHtml;
  document.getElementById('tbmModalNote').value = dayData.note || '';

  // 체크박스 토글 시 스타일 업데이트
  document.querySelectorAll('#tbmModalList input[type=checkbox]').forEach(ck => {
    ck.addEventListener('change', function(){
      this.nextElementSibling.classList.toggle('done-item', this.checked);
    });
  });

  document.getElementById('tbmModal').classList.add('show');
}

function closeTBMModal(){
  document.getElementById('tbmModal').classList.remove('show');
}

function saveTBMModal(){
  if(!tbmModalDate) return;
  const {year, month, day} = tbmModalDate;
  const key = getTBMKey(year, month, currentSiteTBM);
  const saved = lsGet(key, {});
  const allItems = [...tbmItems.common, ...(tbmItems[currentSiteTBM]||[])];

  const checks = {};
  allItems.forEach((_, idx) => {
    const ck = document.getElementById(`tbm_ck_${idx}`);
    if(ck && ck.checked) checks[`i${idx}`] = true;
  });

  saved[`d${day}`] = {
    checks,
    note: document.getElementById('tbmModalNote').value.trim()
  };
  lsSet(key, saved);
  closeTBMModal();
  renderTBM();
}

/* ─────────────────────────────────────────
   초기화
   ───────────────────────────────────────── */
function init(){
  const now = new Date();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth();

  // 연도/월 셀렉터 초기화
  ['patrolYear','tbmYear'].forEach(id => {
    const sel = document.getElementById(id);
    for(let y=curYear-1;y<=curYear+1;y++){
      const opt = document.createElement('option');
      opt.value=y; opt.textContent=y+'년';
      if(y===curYear) opt.selected=true;
      sel.appendChild(opt);
    }
  });
  ['patrolMonth','tbmMonth'].forEach(id => {
    const sel = document.getElementById(id);
    for(let m=0;m<12;m++){
      const opt = document.createElement('option');
      opt.value=m; opt.textContent=(m+1)+'월';
      if(m===curMonth) opt.selected=true;
      sel.appendChild(opt);
    }
  });

  renderPatrol();
  renderIssues();
  renderTBM();
}

init();
</script>
